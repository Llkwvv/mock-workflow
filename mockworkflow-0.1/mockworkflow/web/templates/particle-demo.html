<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Tech Demo - Light/Dark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* 亮色模式 */
        body.light-mode {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            color: #0f172a;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        body.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            color: #0f172a;
            border-color: rgba(0, 0, 0, 0.2);
        }

        body.light-mode .theme-toggle:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        /* 粒子背景 */
        #particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: #00d4ff;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: particleFloat 8s infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 1;
                transform: translateY(80vh) scale(1);
            }
            90% {
                opacity: 1;
                transform: translateY(20vh) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
        }

        /* 玻璃态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 
                0 8px 32px rgba(0, 212, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 12px 40px rgba(0, 212, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
        }

        /* 亮色模式卡片 */
        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 
                0 8px 32px rgba(0, 212, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        body.light-mode .glass-card:hover {
            box-shadow: 
                0 12px 40px rgba(0, 212, 255, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            border-color: rgba(0, 212, 255, 0.4);
        }

        /* 霓虹按钮 */
        .neon-btn {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .neon-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .neon-btn:hover::before {
            left: 100%;
        }

        .neon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
        }

        /* 发光输入框 */
        .glow-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .glow-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .glow-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* 标题样式 */
        .tech-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        body.light-mode .tech-title {
            background: linear-gradient(45deg, #0ea5e9, #8b5cf6);
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
            }
            to {
                filter: drop-shadow(0 0 30px rgba(255, 0, 255, 0.5));
            }
        }

        body.light-mode .tech-title {
            animation: glow-light 2s ease-in-out infinite alternate;
        }

        @keyframes glow-light {
            from {
                filter: drop-shadow(0 0 20px rgba(14, 165, 233, 0.3));
            }
            to {
                filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.3));
            }
        }

        /* 状态指示器 */
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        .status-indicator.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* 容器布局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        /* 数据表格 */
        .tech-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .tech-table th,
        .tech-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tech-table th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }

        .tech-table tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        /* 进度条 */
        .tech-progress {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .tech-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            border-radius: 4px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-bg"></div>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span>
        <span id="theme-text">暗色模式</span>
    </button>

    <div class="container">
        <h1 class="tech-title">Mockworkflow</h1>
        <p style="text-align: center; opacity: 0.8; margin-bottom: 50px;">Particle Tech Style Demo</p>

        <div class="demo-grid">
            <!-- 任务卡片 -->
            <div class="glass-card">
                <h2 style="margin-bottom: 20px;">
                    <span class="status-indicator online"></span>
                    任务状态
                </h2>
                <div class="tech-progress">
                    <div class="tech-progress-bar"></div>
                </div>
                <p>正在处理: <span style="color: #00d4ff;">数据生成任务 #1234</span></p>
                <p>完成度: <span style="color: #00ff88;">75%</span></p>
                <button class="neon-btn" style="margin-top: 20px;">查看详情</button>
            </div>

            <!-- 样本文件卡片 -->
            <div class="glass-card">
                <h2 style="margin-bottom: 20px;">📁 样本文件</h2>
                <table class="tech-table">
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>大小</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>sample_data.csv</td>
                            <td>2.3 MB</td>
                            <td style="color: #00ff88;">✓ 已处理</td>
                        </tr>
                        <tr>
                            <td>test_data.xlsx</td>
                            <td>1.1 MB</td>
                            <td style="color: #ff9500;">⚠ 处理中</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 统计卡片 -->
            <div class="glass-card">
                <h2 style="margin-bottom: 20px;">📊 实时统计</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <p style="opacity: 0.7;">总任务数</p>
                        <p style="font-size: 2rem; color: #00d4ff;">1,234</p>
                    </div>
                    <div>
                        <p style="opacity: 0.7;">成功率</p>
                        <p style="font-size: 2rem; color: #00ff88;">98.5%</p>
                    </div>
                </div>
                <button class="neon-btn" style="margin-top: 20px; width: 100%;">刷新数据</button>
            </div>

            <!-- 定时任务卡片 -->
            <div class="glass-card">
                <h2 style="margin-bottom: 20px;">⏰ 定时任务</h2>
                <div style="margin-bottom: 15px;">
                    <p style="opacity: 0.7;">下次执行</p>
                    <p style="color: #ff00ff;">2024-06-04 14:30:00</p>
                </div>
                <div style="margin-bottom: 20px;">
                    <p style="opacity: 0.7;">任务频率</p>
                    <p>每小时执行一次</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="neon-btn" style="flex: 1;">启用</button>
                    <button class="neon-btn" style="flex: 1; background: linear-gradient(45deg, #ff00ff, #ff0099);">编辑</button>
                </div>
            </div>

            <!-- 上传区域 -->
            <div class="glass-card">
                <h2 style="margin-bottom: 20px;">📤 文件上传</h2>
                <div style="border: 2px dashed rgba(0, 212, 255, 0.3); border-radius: 10px; padding: 40px; text-align: center; transition: all 0.3s ease; cursor: pointer;" 
                     onmouseover="this.style.borderColor='#00d4ff'; this.style.background='rgba(0, 212, 255, 0.05)'"
                     onmouseout="this.style.borderColor='rgba(0, 212, 255, 0.3)'; this.style.background='transparent'">
                    <p style="font-size: 3rem; margin-bottom: 10px;">📁</p>
                    <p>拖拽文件到此处或点击选择</p>
                    <p style="opacity: 0.5; font-size: 0.9rem;">支持 CSV, XLS, XLSX 格式</p>
                </div>
                <input type="file" class="glow-input" style="width: 100%; margin-top: 20px;" placeholder="或选择文件...">
            </div>

            <!-- 设置卡片 -->
            <div class="glass-card">
                <h2 style="margin-bottom: 20px;">⚙️ 快速设置</h2>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; opacity: 0.8;">生成行数</label>
                    <input type="number" class="glow-input" value="100" style="width: 100%;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; opacity: 0.8;">表名前缀</label>
                    <input type="text" class="glow-input" placeholder="test_" style="width: 100%;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" checked style="margin-right: 10px;">
                        <span>启用数据库导出</span>
                    </label>
                </div>
                <button class="neon-btn" style="width: 100%;">应用设置</button>
            </div>
        </div>
    </div>

    <script>
        // 创建粒子背景
        function createParticles() {
            const container = document.getElementById('particles-bg');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // 随机大小
                const size = Math.random() * 4 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                // 随机位置
                particle.style.left = Math.random() * 100 + '%';
                
                // 随机延迟
                particle.style.animationDelay = Math.random() * 8 + 's';
                
                // 随机颜色
                const colors = ['#00d4ff', '#ff00ff', '#00ff88', '#ff9500'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                container.appendChild(particle);
            }
        }

        // 鼠标跟随效果
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const angleX = (y - centerY) / 20;
                const angleY = (centerX - x) / 20;
                
                card.style.transform = `perspective(1000px) rotateX(${angleX}deg) rotateY(${angleY}deg) translateZ(10px)`;
            });
        });

        // 重置卡片位置
        document.addEventListener('mouseleave', () => {
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0)';
            });
        });

        // 主题切换功能
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                themeIcon.textContent = '🌙';
                themeText.textContent = '暗色模式';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode');
                themeIcon.textContent = '☀️';
                themeText.textContent = '亮色模式';
                localStorage.setItem('theme', 'light');
            }
        }

        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeIcon.textContent = '☀️';
                themeText.textContent = '亮色模式';
            } else {
                themeIcon.textContent = '🌙';
                themeText.textContent = '暗色模式';
            }
        }

        // 初始化
        createParticles();
        initTheme();
    </script>
</body>
</html>
