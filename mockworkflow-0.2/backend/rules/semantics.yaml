# Semantic field configuration for mock-workflow.
# Add new semantics here without touching Python code.
#
# Each entry:
#   keywords_en  : list of English keywords matched case-insensitively
#   keywords_cn  : list of Chinese keywords matched exactly
#   keywords_pinyin: list of pinyin-abbreviation keywords (e.g. "dq", "rq")
#   faker        : optional faker strategy used by entity_faker.py
#                  supported: company_name, city_name, address, name,
#                             phone_number, email, url, license_plate
#   priority     : higher = checked earlier (default 0)
#   strict_mode_reuse: when true, the value_pool may be reused as enum;
#                      when false, values are always fabricated.

